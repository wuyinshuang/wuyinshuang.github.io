<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎂 白晨晨 生日快乐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0015;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ===== 背景渐变 ===== */
  #bg-gradient {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, #1a0030, #0a0015);
    z-index: 0;
  }
  #bg-gradient::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,100,150,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(255,200,50,0.06) 0%, transparent 60%);
    animation: bgPulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  /* ===== 电子书 ===== */
  #book-wrapper {
    position: fixed;
    inset: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 3000px;
    padding: 20px;
    pointer-events: none;
  }
  #book-wrapper > * { pointer-events: auto; }

  #book {
    position: relative;
    width: min(88vw, 420px);
    height: min(72vh, 560px);
    transform-style: preserve-3d;
    border-radius: 4px 12px 12px 4px;
    box-shadow:
      -8px 0 20px rgba(0,0,0,0.4),
      0 8px 40px rgba(0,0,0,0.5),
      0 0 60px rgba(255,200,100,0.06);
  }

  /* 书脊装饰 */
  #spine {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 18px;
    z-index: 200;
    background: linear-gradient(90deg, #8B6914, #a0762a, #8B6914);
    border-radius: 4px 0 0 4px;
    box-shadow: inset -2px 0 8px rgba(0,0,0,0.3);
    pointer-events: none;
  }
  #spine::after {
    content: '';
    position: absolute;
    top: 20px; bottom: 20px; left: 5px;
    width: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 1px;
  }

  /* 页面 */
  .page {
    position: absolute;
    inset: 0;
    transform-origin: 18px center;
    transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4, 0.0, 0.2, 1);
    cursor: pointer;
    border-radius: 0 8px 8px 0;
    box-shadow: 2px 0 12px rgba(0,0,0,0.1);
    will-change: transform;
  }
  .page-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 0 8px 8px 0;
    overflow: hidden;
  }
  .page-back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #f5f0e8, #ede6d8);
  }
  .page-back::after {
    content: '';
    position: absolute;
    inset: 15px;
    border: 1px solid rgba(0,0,0,0.04);
    border-radius: 4px;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 28px,
      rgba(0,0,0,0.015) 28px,
      rgba(0,0,0,0.015) 29px
    );
  }

  /* 页面已翻状态 */
  .page.flipped {
    transform: rotateY(-180deg);
    pointer-events: none;
  }

  /* ===== 封面 ===== */
  .page-cover .page-front {
    background: linear-gradient(145deg, #fbbf24 0%, #f59e0b 30%, #d97706 60%, #b45309 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }
  .page-cover .page-front::before {
    content: '';
    position: absolute;
    inset: 12px;
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 4px;
    pointer-events: none;
  }
  .page-cover .page-front::after {
    content: '';
    position: absolute;
    inset: 18px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 2px;
    pointer-events: none;
  }
  .cover-name {
    font-family: 'Ma Shan Zheng', 'STKaiti', serif;
    font-size: clamp(2.2rem, 9vw, 3.8rem);
    color: #fff;
    text-shadow: 0 2px 16px rgba(0,0,0,0.3);
    letter-spacing: 0.15em;
    position: relative;
    z-index: 1;
  }
  .cover-sub {
    font-family: 'ZCOOL KuaiLe', 'PingFang SC', sans-serif;
    font-size: clamp(1.2rem, 4vw, 2rem);
    color: rgba(255,255,255,0.9);
    text-shadow: 0 1px 8px rgba(0,0,0,0.2);
    margin-top: 0.25em;
    letter-spacing: 0.2em;
    position: relative;
    z-index: 1;
  }
  .cover-hearts {
    position: absolute;
    bottom: 30px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 16px;
    letter-spacing: 8px;
    z-index: 1;
  }

  /* ===== 照片页 ===== */
  .page-photo .page-front {
    background: #fffaf3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 25px;
  }
  .photo-frame {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .photo-frame img {
    width: 100%;
    height: 85%;
    object-fit: cover;
    border-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    transition: transform 0.3s ease;
  }
  .photo-caption {
    margin-top: 10px;
    font-family: 'ZCOOL KuaiLe', 'PingFang SC', sans-serif;
    font-size: clamp(0.7rem, 1.8vw, 0.9rem);
    color: rgba(0,0,0,0.35);
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* ===== 页码 ===== */
  #page-indicator {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    gap: 8px;
    align-items: center;
    pointer-events: none;
  }
  #page-indicator .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.4s ease;
  }
  #page-indicator .dot.active {
    background: #fbbf24;
    box-shadow: 0 0 10px rgba(251,191,36,0.4);
    width: 9px;
    height: 9px;
  }
  #page-indicator .num {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    margin-left: 6px;
    letter-spacing: 0.05em;
  }

  /* ===== 翻页提示 ===== */
  #flip-hint {
    position: fixed;
    z-index: 8;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #flip-hint.show { opacity: 1; }
  #flip-hint.right {
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.15);
    font-size: 28px;
    animation: hintPulse 2s ease-in-out infinite;
  }
  #flip-hint.left {
    left: 15px;
    top: 50%;
    transform: translateY(-50%) rotate(180deg);
    color: rgba(255,255,255,0.15);
    font-size: 28px;
    animation: hintPulse 2s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.15; transform: translateY(-50%) translateX(0); }
    50% { opacity: 0.5; transform: translateY(-50%) translateX(-6px); }
  }
  #flip-hint.left {
    animation-name: hintPulseLeft;
  }
  @keyframes hintPulseLeft {
    0%, 100% { opacity: 0.15; transform: translateY(-50%) rotate(180deg) translateX(0); }
    50% { opacity: 0.5; transform: translateY(-50%) rotate(180deg) translateX(-6px); }
  }

  /* ===== 音乐按钮 调整位置 ===== */
  #music-btn {
    position: fixed;
    bottom: 70px;
    right: 20px;
    z-index: 100;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    color: rgba(255,255,255,0.7);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #music-btn.playing {
    animation: pulseBtn 2s ease-in-out infinite;
  }
  @keyframes pulseBtn {
    0%, 100% { box-shadow: 0 0 0 0 rgba(249,159,134,0.2); }
    50% { box-shadow: 0 0 0 10px rgba(249,159,134,0); }
  }

  /* ===== 浮动心形 ===== */
  .float-heart {
    position: fixed;
    z-index: 5;
    font-size: 24px;
    opacity: 0;
    pointer-events: none;
    animation: floatUp var(--dur, 6s) ease-in var(--delay, 0s) forwards;
  }
  @keyframes floatUp {
    0% {
      opacity: 0;
      transform: translateY(100vh) rotate(0deg) scale(0.5);
    }
    10% {
      opacity: var(--max-opacity, 0.7);
    }
    90% {
      opacity: var(--max-opacity, 0.7);
    }
    100% {
      opacity: 0;
      transform: translateY(-10vh) rotate(var(--rot, 360deg)) scale(1.2);
    }
  }

  /* ===== 五彩纸屑 ===== */
  .confetti-piece {
    position: fixed;
    z-index: 6;
    width: var(--size, 10px);
    height: var(--size, 10px);
    top: -20px;
    opacity: 0;
    pointer-events: none;
    animation: confettiFall var(--fall-dur, 4s) ease-in var(--delay, 0s) forwards;
  }
  @keyframes confettiFall {
    0% {
      opacity: 0;
      transform: translateY(0) rotate(0deg) scale(1);
    }
    10% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform: translateY(110vh) rotate(var(--spin, 720deg)) scale(0.5);
    }
  }

  /* ===== 星星闪烁 ===== */
  .star {
    position: fixed;
    z-index: 2;
    width: var(--star-size, 3px);
    height: var(--star-size, 3px);
    border-radius: 50%;
    background: #fff;
    pointer-events: none;
    animation: twinkle var(--twinkle-dur, 3s) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0%   { opacity: var(--min-op, 0.2); transform: scale(1); }
    100% { opacity: var(--max-op, 1);   transform: scale(1.3); }
  }

  /* ===== 底部文字 ===== */
  #footer {
    position: fixed;
    bottom: 30px;
    left: 0;
    right: 0;
    z-index: 10;
    text-align: center;
    color: rgba(255,255,255,0.2);
    font-family: 'Ma Shan Zheng', 'PingFang SC', serif;
    font-size: 13px;
    letter-spacing: 0.25em;
  }

  /* ===== 加载过渡 ===== */
  #loader {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #0a0015;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 1.2s ease;
  }
  #loader.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .loader-ring {
    width: 60px;
    height: 60px;
    border: 3px solid transparent;
    border-top-color: #f9d976;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  .loader-ring::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 3px solid transparent;
    border-bottom-color: #f39f86;
    border-radius: 50%;
    animation: spin 1.5s linear infinite reverse;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ===== 响应式 ===== */
  @media (max-width: 480px) {
    #music-btn { bottom: 20px; right: 20px; width: 44px; height: 44px; font-size: 18px; }
    .float-heart { font-size: 18px; }
  }
</style>
</head>
<body>

<!-- 加载 -->
<div id="loader"><div class="loader-ring"></div></div>

<!-- 背景 -->
<div id="bg-gradient"></div>

<!-- 星星背景 -->
<div id="starfield"></div>

<!-- 电子书 -->
<div id="book-wrapper">
  <div id="book">
    <div id="spine"></div>
    <!-- 页面由 JS 生成 -->
  </div>
</div>

<!-- 翻页提示 -->
<div id="flip-hint" class="right">&#10095;</div>

<!-- 页码 -->
<div id="page-indicator"></div>

<!-- 底部提示 -->
<div id="footer">&#10022; 轻触翻页 &#10022;</div>

<!-- 音乐按钮 -->
<button id="music-btn" class="playing" title="点击开关音乐">
  <span class="icon">&#9835;</span>
</button>

<script>
// =============================================
// 1. 电子书 - 翻页
// =============================================
(function initBook() {
  const book = document.getElementById('book');
  const totalPhotos = 7;
  const totalPages = 1 + totalPhotos; // 封面 + 7张照片
  let currentIdx = 0; // 当前显示的页面索引
  let isAnimating = false;
  const hint = document.getElementById('flip-hint');

  // 生成页面
  function createPages() {
    // 封面
    const cover = document.createElement('div');
    cover.className = 'page page-cover';
    cover.dataset.index = '0';
    cover.innerHTML = `
      <div class="page-face page-front">
        <div class="cover-name">白晨晨</div>
        <div class="cover-sub">&#127874; 生日快乐 &#127874;</div>
        <div class="cover-hearts">&#10084; &#10084; &#10084;</div>
      </div>
      <div class="page-face page-back"></div>
    `;
    book.appendChild(cover);

    // 照片页
    for (let i = 1; i <= totalPhotos; i++) {
      const p = document.createElement('div');
      p.className = 'page page-photo';
      p.dataset.index = String(i);
      const captions = [
        '&#10022; 美好时光 &#10022;',
        '&#10022; 笑颜如花 &#10022;',
        '&#10022; 温暖如你 &#10022;',
        '&#10022; 闪闪发光 &#10022;',
        '&#10022; 天真烂漫 &#10022;',
        '&#10022; 岁月静好 &#10022;',
        '&#10022; 你是唯一 &#10022;',
      ];
      p.innerHTML = `
        <div class="page-face page-front">
          <div class="photo-frame">
            <img src="照片/${i}.jpg" alt="Photo ${i}" loading="${i <= 2 ? 'eager' : 'lazy'}">
            <div class="photo-caption">${captions[i-1]}</div>
          </div>
        </div>
        <div class="page-face page-back"></div>
      `;
      book.appendChild(p);
    }
  }
  createPages();

  const pages = book.querySelectorAll('.page');

  // 初始化 z-index: 封面在最上面，照片页依次递减
  function resetZIndices() {
    for (let i = 0; i < pages.length; i++) {
      if (pages[i].classList.contains('flipped')) {
        pages[i].style.zIndex = i + 1; // 已翻页的在下面
      } else {
        pages[i].style.zIndex = pages.length - i; // 未翻页的按顺序
      }
    }
  }
  resetZIndices();

  // 更新页码指示器
  function updateIndicator() {
    const container = document.getElementById('page-indicator');
    container.innerHTML = '';
    for (let i = 0; i < totalPages; i++) {
      const dot = document.createElement('span');
      dot.className = 'dot' + (i === currentIdx ? ' active' : '');
      container.appendChild(dot);
    }
    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = `${currentIdx + 1} / ${totalPages}`;
    container.appendChild(num);

    // 显示/隐藏翻页提示
    hint.classList.remove('show');
    if (currentIdx === 0) {
      hint.classList.add('show');
      hint.className = 'right show';
    } else if (currentIdx === totalPages - 1) {
      hint.classList.add('show');
      hint.className = 'left show';
    }
  }
  updateIndicator();

  // 翻到下一页
  function flipForward() {
    if (isAnimating || currentIdx >= totalPages - 1) return;
    isAnimating = true;

    const page = pages[currentIdx];
    page.classList.add('flipped');
    page.style.zIndex = 0; // 沉底

    currentIdx++;
    updateIndicator();

    setTimeout(() => { isAnimating = false; }, 800);
  }

  // 翻回上一页
  function flipBack() {
    if (isAnimating || currentIdx <= 0) return;
    isAnimating = true;

    currentIdx--;
    const page = pages[currentIdx];
    page.classList.remove('flipped');
    page.style.zIndex = pages.length - currentIdx; // 放回正确位置

    updateIndicator();

    setTimeout(() => { isAnimating = false; }, 800);
  }

  // 点击区域判断
  book.addEventListener('click', (e) => {
    const rect = book.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const mid = rect.width / 2;
    if (x > mid) {
      flipForward();
    } else {
      flipBack();
    }
  });

  // 触摸滑动
  let touchStartX = 0;
  let touchStartY = 0;
  book.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, { passive: true });

  book.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;
    // 滑动距离 > 30px 且水平分量大于垂直分量
    if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) flipForward();
      else flipBack();
    }
  }, { passive: true });

  // 键盘
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') flipForward();
    if (e.key === 'ArrowLeft') flipBack();
  });
})();

// =============================================
// 2. 星星背景
// =============================================
(function initStars() {
  const container = document.getElementById('starfield');
  const count = 100;
  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = 1 + Math.random() * 2.5;
    star.style.cssText = `
      position: fixed;
      z-index: 2;
      width: ${size}px;
      height: ${size}px;
      border-radius: 50%;
      background: #fff;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      opacity: ${0.15 + Math.random() * 0.5};
      animation: twinkle ${2 + Math.random() * 4}s ease-in-out infinite alternate;
      animation-delay: ${Math.random() * 5}s;
      pointer-events: none;
    `;
    container.appendChild(star);
  }
})();

// =============================================
// 3. 浮动心形
// =============================================
(function initFloatingHearts() {
  const emojis = ['❤️', '💕', '💗', '✨', '🌸', '🎈', '💖', '🌟', '💝'];
  setInterval(() => {
    const el = document.createElement('div');
    el.className = 'float-heart';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.cssText = `
      position: fixed;
      z-index: 4;
      font-size: ${16 + Math.random() * 20}px;
      opacity: 0;
      pointer-events: none;
      left: ${5 + Math.random() * 90}%;
      animation: floatUp ${6 + Math.random() * 6}s ease-in 0s forwards;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 13000);
  }, 600);
  for (let i = 0; i < 3; i++) setTimeout(() => {}, i * 200);
})();

// =============================================
// 4. 五彩纸屑（开场放一波）
// =============================================
(function initConfetti() {
  const colors = ['#f9d976', '#f39f86', '#ff6b9d', '#c084fc', '#60a5fa', '#34d399', '#fb923c'];
  let count = 0;
  const max = 40;
  const interval = setInterval(() => {
    if (count >= max) { clearInterval(interval); return; }
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 6 + Math.random() * 8;
    el.style.cssText = `
      position: fixed;
      z-index: 6;
      width: ${size}px;
      height: ${size}px;
      top: -20px;
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      opacity: 0;
      pointer-events: none;
      animation: confettiFall ${3 + Math.random() * 3}s ease-in ${Math.random() * 2}s forwards;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 8000);
    count++;
  }, 80);
})();

// 星星闪烁和纸屑掉落的 keyframes (已移至 CSS)

// =============================================
// 5. 音乐（同之前 - 无缝循环）
// =============================================
(function initMusic() {
  const btn = document.getElementById('music-btn');
  const icon = btn.querySelector('.icon');
  let audioCtx = null;
  let gainNode = null;
  let isActive = false;
  let loopTimeout = null;
  let isPausedByUser = false;

  const melody = [
    [261.63, 0, 0.3], [261.63, 0.35, 0.15],
    [293.66, 0.55, 0.3], [261.63, 0.9, 0.3],
    [349.23, 1.25, 0.3], [329.63, 1.6, 0.5],
    [261.63, 2.3, 0.3], [261.63, 2.65, 0.15],
    [293.66, 2.85, 0.3], [261.63, 3.2, 0.3],
    [392.00, 3.55, 0.3], [349.23, 3.9, 0.5],
    [261.63, 4.6, 0.3], [261.63, 4.95, 0.15],
    [523.25, 5.15, 0.3], [440.00, 5.5, 0.3],
    [349.23, 5.85, 0.3], [329.63, 6.2, 0.3],
    [293.66, 6.55, 0.5],
    [440.00, 7.3, 0.3], [440.00, 7.65, 0.15],
    [392.00, 7.85, 0.3], [349.23, 8.2, 0.3],
    [392.00, 8.55, 0.3], [349.23, 8.9, 0.6],
  ];
  const LOOP_LEN = 10.0;

  function playNote(ctx, dest, freq, time, dur, vol) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    const f = ctx.createBiquadFilter();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, time);
    f.type = 'lowpass';
    f.frequency.setValueAtTime(800, time);
    f.frequency.linearRampToValueAtTime(1200, time + dur);
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(vol, time + 0.03);
    g.gain.setValueAtTime(vol, time + dur * 0.7);
    g.gain.linearRampToValueAtTime(0, time + dur);
    osc.connect(f).connect(g).connect(dest);
    osc.start(time);
    osc.stop(time + dur + 0.05);
  }

  function scheduleOneLoop(ctx, dest, baseTime) {
    melody.forEach(([freq, t, dur]) => {
      playNote(ctx, dest, freq, baseTime + t, dur, 0.12);
    });
    const chordPoints = [0, 2.3, 4.6, 7.3];
    const chordFreqs = [
      [261.63, 329.63, 392.00],
      [349.23, 440.00, 523.25],
      [392.00, 493.88, 587.33],
      [261.63, 329.63, 392.00],
    ];
    chordPoints.forEach((cp, i) => {
      chordFreqs[i].forEach(f => playNote(ctx, dest, f, baseTime + cp, 1.8, 0.04));
    });
  }

  function startScheduler() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0.5;
      gainNode.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (isActive) return;
    isActive = true;
    let nextBase = audioCtx.currentTime + 0.1;
    scheduleOneLoop(audioCtx, gainNode, nextBase);
    nextBase += LOOP_LEN;
    function keepScheduling() {
      if (!isActive) return;
      const now = audioCtx.currentTime;
      if (nextBase - now < 0.3) {
        scheduleOneLoop(audioCtx, gainNode, nextBase);
        nextBase += LOOP_LEN;
      }
      loopTimeout = setTimeout(keepScheduling, 200);
    }
    keepScheduling();
  }

  function stopScheduler() {
    isActive = false;
    if (loopTimeout) { clearTimeout(loopTimeout); loopTimeout = null; }
  }

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.5;
  gainNode.connect(audioCtx.destination);

  function tryAutoStart() {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => { if (!isPausedByUser) startScheduler(); }).catch(() => {});
    } else {
      if (!isPausedByUser) startScheduler();
    }
  }
  tryAutoStart();

  function firstInteraction() {
    tryAutoStart();
    document.removeEventListener('click', firstInteraction);
    document.removeEventListener('touchstart', firstInteraction);
  }
  document.addEventListener('click', firstInteraction);
  document.addEventListener('touchstart', firstInteraction);

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (isActive) {
      stopScheduler();
      isPausedByUser = true;
      btn.classList.remove('playing');
    } else {
      isPausedByUser = false;
      startScheduler();
      btn.classList.add('playing');
    }
  });

  document.addEventListener('visibilitychange', () => {
    if (audioCtx && gainNode) {
      gainNode.gain.value = document.hidden ? 0.08 : 0.5;
    }
  });
})();

// =============================================
// 6. 加载完成
// =============================================
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
  }, 500);
});
</script>
